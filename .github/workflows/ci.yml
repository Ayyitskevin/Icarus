name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm from packageManager
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.23.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preload immutable sandbox image
        run: >-
          docker pull
          python:3.12-slim@sha256:c3d81d25b3154142b0b42eb1e61300024426268edeb5b5a26dd7ddf64d9daf28

      - name: Run deterministic release gate
        run: pnpm check

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Check patch whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$BASE_SHA...HEAD"
          elif [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            EMPTY_TREE=$(git hash-object -t tree /dev/null)
            git diff --check "$EMPTY_TREE..HEAD"
          else
            git diff --check "$BEFORE_SHA..HEAD"
          fi
